<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaTrack - Surface Control Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        #map { height: 600px; width: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <!-- Header / Navigasi -->
    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-white text-2xl font-bold">SeaTrack Surface Control</h1>
            
            <div class="flex items-center gap-4">
                <!-- System Health Stats -->
                <div class="hidden md:flex gap-4 text-white text-xs mr-4">
                    <div class="flex flex-col items-center bg-blue-700 px-3 py-1 rounded">
                        <span class="opacity-70">CPU</span>
                        <span id="cpu-stat" class="font-bold">--%</span>
                    </div>
                    <div class="flex flex-col items-center bg-blue-700 px-3 py-1 rounded">
                        <span class="opacity-70">RAM</span>
                        <span id="ram-stat" class="font-bold">--%</span>
                    </div>
                </div>

                <div id="status-badge" class="bg-green-500 text-white px-3 py-1 rounded-full text-sm font-semibold transition-colors duration-500">
                    Status: Terhubung
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Kolom Kiri: Visualisasi Peta -->
            <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
                <div class="p-4 border-b border-gray-200 bg-gray-50">
                    <h2 class="text-lg font-semibold text-gray-800">Peta Sebaran Sampah (Real-time)</h2>
                </div>
                <div id="map" class="z-10"></div>
            </div>

            <!-- Kolom Kanan: Log Deteksi -->
            <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200 flex flex-col">
                <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">Riwayat Deteksi Terkini</h2>
                    <p class="text-xs text-gray-500 italic">Auto-refresh: 3s</p>
                </div>
                
                <div class="overflow-x-auto overflow-y-auto max-h-[550px] custom-scroll">
                    <table class="min-w-full bg-white">
                        <thead class="bg-gray-800 text-white sticky top-0">
                            <tr>
                                <th class="py-3 px-4 uppercase font-semibold text-xs text-left">ID</th>
                                <th class="py-3 px-4 uppercase font-semibold text-xs text-left">Jenis</th>
                                <th class="py-3 px-4 uppercase font-semibold text-xs text-left">Conf.</th>
                                <th class="py-3 px-4 uppercase font-semibold text-xs text-left">Koordinat</th>
                            </tr>
                        </thead>
                        <tbody id="telemetry-table-body" class="text-gray-700 divide-y divide-gray-100">
                            <tr>
                                <td colspan="4" class="py-10 text-center text-gray-400">Sedang memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-10 text-center text-gray-500 text-sm pb-10">
        &copy; 2026 SeaTrack Project - Hari ke-14: OpenVINO & System Health Integration
    </footer>

    <script>
        let map;
        let markers = {}; 

        function initMap() {
            map = L.map('map').setView([-7.2756, 112.7939], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        async function fetchTelemetryData() {
            try {
                const response = await fetch('/telemetry/?limit=20');
                if (!response.ok) throw new Error('Gagal koneksi ke API');
                const data = await response.json();
                updateTableUI(data);
                updateMapMarkers(data);
                
                document.getElementById('status-badge').innerText = 'Status: Terhubung';
                document.getElementById('status-badge').classList.replace('bg-red-500', 'bg-green-500');
            } catch (error) {
                document.getElementById('status-badge').innerText = 'Status: Terputus';
                document.getElementById('status-badge').classList.replace('bg-green-500', 'bg-red-500');
            }
        }

        async function fetchSystemHealth() {
            try {
                const response = await fetch('/system-health/latest');
                if (!response.ok) return;
                const data = await response.json();
                
                const cpuEl = document.getElementById('cpu-stat');
                const ramEl = document.getElementById('ram-stat');
                
                cpuEl.innerText = `${data.cpu_usage.toFixed(1)}%`;
                ramEl.innerText = `${data.ram_usage.toFixed(1)}%`;
                
                // Beri warna merah jika overload (> 80%)
                cpuEl.className = data.cpu_usage > 80 ? 'font-bold text-red-300' : 'font-bold text-white';
                ramEl.className = data.ram_usage > 80 ? 'font-bold text-red-300' : 'font-bold text-white';

            } catch (error) {
                console.error('Health Fetch Error:', error);
            }
        }

        function updateMapMarkers(telemetries) {
            telemetries.forEach(item => {
                if (!markers[item.id]) {
                    const marker = L.marker([item.latitude, item.longitude]).addTo(map);
                    const popupContent = `
                        <div class="text-sm">
                            <strong class="text-blue-600 uppercase">${item.object_class}</strong><br>
                            Confidence: <b>${(item.confidence_score * 100).toFixed(1)}%</b>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                    markers[item.id] = marker;
                }
            });
        }

        function updateTableUI(telemetries) {
            const tableBody = document.getElementById('telemetry-table-body');
            tableBody.innerHTML = '';
            telemetries.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-blue-50 transition-colors duration-150 cursor-pointer border-b border-gray-50';
                row.onclick = () => {
                    map.setView([item.latitude, item.longitude], 18);
                    markers[item.id].openPopup();
                };
                row.innerHTML = `
                    <td class="py-3 px-4 text-[10px] font-mono text-gray-400">${item.id}</td>
                    <td class="py-3 px-4"><span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-[10px] font-bold uppercase">${item.object_class}</span></td>
                    <td class="py-3 px-4 text-xs font-semibold">${(item.confidence_score * 100).toFixed(0)}%</td>
                    <td class="py-3 px-4 text-[10px] text-gray-500 text-right">${item.latitude.toFixed(5)}, ${item.longitude.toFixed(5)}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        initMap();
        setInterval(fetchTelemetryData, 3000);
        setInterval(fetchSystemHealth, 5000);
        fetchTelemetryData();
        fetchSystemHealth();
    </script>
</body>
</html>
